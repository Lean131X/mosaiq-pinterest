<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaiq - Detalle</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/detalle.css">
</head>

<body>

    <!-- ENCABEZADO -->
    <header class="encabezado">
        <a href="index.html" class="logo">Mosa<span class="logo__acento">iq</span></a>

        <div class="busqueda">
            <input type="search" class="busqueda__campo" placeholder="Buscar por titulo, descripcion o etiquetas...">
        </div>

        <a href="login.html" class="boton boton--secundario">Iniciar sesion</a>
        <a href="register.html" class="boton boton--primario">Registrarse</a>
    </header>

    <!-- DETALLE DE LA PUBLICACION -->
    <main class="detalle">
        <article class="detalle__tarjeta">

            <figure class="detalle__figura">
                <img class="detalle__imagen" id="detalle-imagen" src="" alt="">
            </figure>

            <div class="detalle__info">
                <h1 class="detalle__titulo" id="detalle-titulo"></h1>
                <p class="detalle__descripcion" id="detalle-descripcion"></p>

                <div class="autor">
                    <div class="autor__avatar" id="autor-avatar"></div>
                    <div>
                        <p class="autor__nombre" id="autor-nombre"></p>
                        <p class="autor__fecha" id="autor-fecha"></p>
                    </div>
                </div>

                <div class="detalle__etiquetas" id="detalle-tags"></div>

                <section class="comentarios">
                    <h2 class="comentarios__titulo">Comentarios</h2>

                    <div class="comentarios__lista" id="lista-comentarios"></div>

                    <div class="comentarios__nuevo" id="nuevo-comentario"></div>
                </section>
            </div>

        </article>

        <!-- PUBLICACIONES RELACIONADAS -->
        <section class="relacionadas">
            <h2 class="relacionadas__titulo">Publicaciones relacionadas</h2>
            <div class="mosaico" id="relacionadas"></div>
        </section>

        <!-- molde de tarjeta relacionada (se clona en el JS) -->
        <article class="publicacion" id="molde-publicacion" hidden>
            <a class="publicacion__enlace" href="#">
                <figure class="publicacion__figura">
                    <img class="publicacion__imagen" src="" alt="">
                </figure>
                <div class="publicacion__info">
                    <h3 class="publicacion__titulo"></h3>
                    <p class="publicacion__autor"></p>
                </div>
            </a>
        </article>

        <!-- molde de comentario (se clona en el JS) -->
        <article class="comentario" id="molde-comentario" hidden>
            <div class="comentario__avatar"></div>
            <div class="comentario__cuerpo">
                <p class="comentario__autor"></p>
                <p class="comentario__texto"></p>
            </div>
        </article>
    </main>

    <!-- PIE -->
    <footer class="pie">
        <p>Mosaiq 2026 - Proyecto Integrador Cuarto Nivel</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/detalle.js"></script>

</body>

</html>
